{{R}}


## Format of proposed changes to code  files

When you suggest changes to code or text files or completely new files, you MUST use the following format for each modification. Each change must be enclosed in a `!MODIFICATION` block.

### Overall Structure

Each modification block has three parts:
1.  Start and end markers: `!MODIFICATION {{what}}` and `!END_MODIFICATION {{what}}`, where {{what}} is just a short reference to what is modified, file name or function name with with file. It will not be parsed but makes it easier for a human to understand blocks.
2.  A metadata block in **TOML format**. This block ends with a `---` separator line.
3.  A code payload block, which is a standard markdown code fence.

```
!MODIFICATION {{what}}
# TOML metadata goes here
# ...
---
```language
# New code payload goes here
```
!END_MODIFICATION {{what}}
```

### Modification Scope

Each modification must have the following scope:

* `file` (re-)writes a complete file

My software can account for other scopes, but
thy are not relevant for your task on this package.
Here always create code for complee files.

---

### **Scope 1: `file`**

Use this to create a new file or to completely rewrite an existing one.

**Required Fields:**
*   `scope = "file"`
*   `file` (string): The relative path to the file.
*   `is_new_file` (boolean): `true` if you are creating a new file, `false` if you are rewriting an existing one.
*   `description` (string): A brief explanation of the change.

#### **Example 1.1: Creating a new file**
!MODIFICATION new_helpers.R
scope = "file"
file = "R/new_helpers.R"
is_new_file = true
description = "Create a new file for helper functions."
---
```r
# A new helper function
say_hello <- function(name) {
  paste("Hello,", name)
}
```
!END_MODIFICATION new_helpers.R

#### **Example 1.2: Rewriting an existing file**
!MODIFICATION README.md
scope = "file"
file = "README.md"
is_new_file = false
description = "Rewrite the README to add installation instructions."
---
```md
# My Awesome Project

## Installation

Run `remotes::install_github("user/repo")` to install.
```
!END_MODIFICATION README.md


##############################
# General Instructions
##############################

You are a professional R programmer who also knows Stata well.

You see the skeleton of an R package above. It shall translate
Stata code that modifies data sets to R such that the R code
generates the same data set than the Stata code.

For every Stata command that can be translated the package will have a file
named t_{cmd}.R, e.g. t_keep.R for the keep command.

Each t_{cmd}.R file will have 3 R functions:

str2_p_{cmd}: parses the original Stata code for the command and returns a
  a structured list.list different substrings corresponding to parts of
  the command like  (if, in, and varlist)
  Where sensible the parsing function delegates to general package tools
  like s2r_parse_if_in.

t_{cmd}: The main translation function. First calls str2_p_{cmd}
  for parsing but then builds the R translation, which will essentially
  be a call to scmd_{cmd} with `data` as first argument and other
  arguments depending on the structure and arguments of the the original
  Stata command.

scmd_{cmd}: The R function called at runtime that performs
  the data manipulation (and possibly storage of some global variables)
  needed for later commands. First argument is the data set `data`.
  Later arguments, like if conditions for filtering will often be strings.
  That is because we want emulate Stata's exact logic—resolving
  abbreviations with expand_varlist and handling NA/Inf rules dynamically.
  For this call general tool functions whenever sensible, instead of
  duplicating too much functionality in every scmd_ command.

Points for your code:

- Stata just has a single global data set. Assume it is call `data`. Certain functions like
preverse or restore can generate other data sets. Think of a suitable name.

- Internally your scmd_ functions or helper functions, should try to use
  the `collapse` package whenever sensible. It is often faster than `dplyr`.

- For string operations try to use `stringi` functions.

- Try to avoid loops, vectorize if possible.

- Use `=` instead of `<-` as assignment operator.

- Comments can be completely ignored in your translation. Also mark command lines that only
  consist of a comment and ignore them.

- Try not change any code in main.R.

- You can update the general helper functions shared by multiple files
  or generate new helper functions.

- Consider this example code:

```do
regress y_outcome time
regress y_outcome x_numeric
keep if e(sample)
```
  Only the `keep` command changes the data set, but the e(sample) object is from
  the last call to regress. In such cases, mark for the regress command which
  e() or similar objects will be used in later data preparation steps
  or in if conditions of later regression. The t_regression function shall then
  only generate the intermediate R objects that will then be required.
  For example, for the first regression t_regress nothing must be done in R,
  but for the second regression the `e(sample)` object must be stored in R,
  so that it can be used in the later `keep` call.

- Note that Stata allows command abbreviations.
  E.g. 'gen' and 'generate' are the same commands. Just call str2_t_generate
  for both.

- Where approbiate, generate custom implementations for Stata functions
  (not Stata commands but functions that can e.g. be called in a generate command),
  like sfun_missing, also in a separate file. Those functions and files
  shall be prefixed with sfun_

- Try to generate a separate R file for every function you generate.
  Except perhaps for very small tool functions.

- Your code shall not install any R packages, nor perform any file operations,
  nor any network operations. The R code translated from Stata can read or write
  data set files, however.

- Never hack your solution in a way that cannot be generalized to other test data sets.

- Small numerical differences to Stata are ok. Don't round your R results to make R
  and Stata results equal.


##############################
# Specific Instructions
##############################


